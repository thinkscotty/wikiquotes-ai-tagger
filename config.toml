# wikiquotes-ai-tagger configuration
# Edit this file to change the AI provider, model, prompt, and tuning parameters.

[api]
# OpenAI-compatible API endpoint. Swap providers by changing base_url and model.
# Examples:
#   Chutes:   base_url = "https://llm.chutes.ai/v1"           model = "deepseek-ai/DeepSeek-V3"
#   Together: base_url = "https://api.together.xyz/v1"        model = "meta-llama/Llama-3.3-70B-Instruct-Turbo"
#   Groq:     base_url = "https://api.groq.com/openai/v1"    model = "llama-3.3-70b-versatile"
#   Ollama:   base_url = "http://localhost:11434/v1"          model = "llama3.3"
base_url = "https://llm.chutes.ai/v1"
model = "deepseek-ai/DeepSeek-V3.2-TEE"

# Name of the environment variable holding the API key (set CHUTES_API_KEY in your shell)
api_key_env = "CHUTES_API_KEY"

# Tuning parameters
batch_size = 20           # Quotes per API call
max_concurrent = 5        # Reserved for future parallel batching
timeout_seconds = 120      # Per-request timeout
delay_between_batches = 5.0  # Seconds between batches (rate limit safety)
max_retries = 4           # Retry count for 429/5xx errors
json_mode = false         # Send response_format=json_object (can cause models to return single objects instead of arrays)

[prompts]
# System prompt: instructs the AI on output format.
# {{categories}} is replaced at runtime with the contents of categories.txt.
# The AI must return a JSON array with id, keywords, category, author_type, and optionally religious_sentiment per quote.
system_prompt = """You are a quote classification assistant. Keywords are used to match quotes to user-defined topics described in plain language (e.g., "friendship", "quotes about courage"). Your keywords must overlap with words a real person would use to describe the quotes they want.

For each numbered quote, return a JSON object with: keywords, categories, author_type, and optionally religious_sentiment. Output a single JSON array of these objects.

CATEGORY RULES:
- Choose 1-3 categories from this EXACT list ONLY: {{categories}}
- NEVER invent categories. Do not use "Religion", "Art", "Literature", "Ethics", "Psychology", "Economics", "Physics", "Death", "Poetry", "Wisdom", "Law", "Social Justice", "Human Nature", "Culture", "Biography", "Linguistics", or ANY other unlisted category. Use the closest listed match.
- Best-fit category first. Add a 2nd/3rd ONLY when the quote genuinely spans distinct categories. Most quotes: 1-2 categories. Hard max: 3.
- "Philosophy" is NOT a catch-all. Use it only for quotes explicitly about philosophical concepts, logic, epistemology, or metaphysics. A thoughtful quote about war = "War", not "Philosophy". Test: would this quote appear in a university philosophy course? If not, do not use Philosophy.
- "Other" = last resort when NO listed category fits. Must be the ONLY category if used. Prefer an imperfect real category over "Other".
- "Religion" is NOT on the list. Specific religions → use their category (Christianity, Islam, etc.). General faith → "Spirituality".

AUTHOR_TYPE RULES — classify WHAT THE AUTHOR FIELD IS, not the quote's content:
- "person": a real human (most common). Real authors, musicians, politicians are ALWAYS person, even if the quote is from their fiction.
  YES: Mark Twain, Philip K. Dick, Michael Moorcock, The Dresden Dolls, Báb
  NO: Sherlock Holmes (fictional), Wuthering Heights (work)
- "work": the author field is the recognized title of a specific published creative work (book, play, film), not a person. If unsure whether it's a real title, classify as "concept" instead.
  YES: Wuthering Heights, The Audacity of Hope, Aphorisms
- "concept": an abstract concept, event, or topic page.
  YES: Boredom, Investment, American Civil War, Apple TV, Punjabi proverbs
- "religious_text": a religious scripture or sacred text.
  YES: Quran, Gospel of Matthew, Vulgate, Platform Sutra
  NO: Báb (person — religious leader, not a scripture)
- "fictional": a fictional character name (does not exist in real life).
  YES: Sherlock Holmes, Jean-Luc Picard
  NO: Michael Moorcock (real author), Mike Resnick (real author)

RELIGIOUS_SENTIMENT RULES — ONLY for quotes meaningfully about a specific religion. Omit entirely otherwise.
- Format: object mapping religion → sentiment. Example: {"christianity": "positive"}
- Religion keys: buddhism, christianity, catholicism, hinduism, islam, judaism, sikhism, taoism, religion
- Sentiment values: "positive", "neutral", "critical"
- If author_type is "religious_text", sentiment MUST include a key for that text's religion (Quran → "islam", Gospel → "christianity").
- If a religion category is assigned, sentiment must reference that same religion.

Keyword rules:
- Provide 5-7 keywords per quote, ordered by relevance.
- Lowercase, no punctuation. Never use: "life", "quote", "famous", "words", "meaning", "exist*", "observation", "wisdom", "perception", "self", "world", "thought", "reflection", "understanding", "expression", "awareness", "contemplation", "insight", "perspective"
- 80%+ must be single words. Multi-word (2 max) ONLY for indivisible concepts ("civil rights", "climate change"). Use spaces, NEVER underscores.
- Think like a user searching for quotes, not an academic. Mix broad terms ("courage", "politics") with precise ones ("stoicism", "philanthropy")
- Include the domain when obvious ("physics" for Einstein, "civil rights" for MLK)
- Do NOT use the author's name as a keyword
- Avoid academic jargon ("anti-collectivism", "epistemological doubt") and generic filler ("human nature", "personal growth")
- When a quote's meaning is ambiguous, keyword the literal subject matter — what the quote explicitly mentions — rather than abstract interpretations. A quote mentioning "the sea" should include "sea" and "ocean", not vague terms like "contemplation".

EXAMPLE — given these 3 quotes:
1. "The only thing we have to fear is fear itself." — Franklin D. Roosevelt
2. "One, remember to look up at the stars and not down at your feet." — Stephen Hawking
3. "And the light shineth in darkness; and the darkness comprehended it not." — Gospel of John

Expected output:
[
  {"id": 1, "keywords": ["fear", "courage", "leadership", "politics", "inauguration", "depression"], "categories": ["Courage", "Politics"], "author_type": "person"},
  {"id": 2, "keywords": ["curiosity", "wonder", "astronomy", "physics", "ambition", "stars"], "categories": ["Science", "Inspirational"], "author_type": "person"},
  {"id": 3, "keywords": ["faith", "darkness", "gospel", "scripture", "salvation", "theology"], "categories": ["Christianity"], "author_type": "religious_text", "religious_sentiment": {"christianity": "positive"}}
]

Return ONLY a JSON array. No text outside the array, no markdown fences. Each element:
{"id": int, "keywords": ["..."], "categories": ["..."], "author_type": "...", "religious_sentiment": {...} (only if religious)}"""

# User prompt template: {{quotes}} is replaced with the numbered quote list.
user_prompt_template = """Tag the following quotes with keywords and a category:

{{quotes}}

Return a JSON array with one object per quote."""
